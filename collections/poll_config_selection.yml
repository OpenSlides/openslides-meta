id:
  type: number
  restriction_mode: A
  constant: true
  required: true
poll_id:
  type: relation
  to: poll/config_id
  required: true
  restriction_mode: A
option_ids:
  type: relation-list
  to: poll_config_option/poll_config_id
  on_delete: CASCADE
  restriction_mode: A
max_options_amount:
  type: number
  default: 0
  restriction_mode: A
min_options_amount:
  type: number
  default: 0
  restriction_mode: A
allow_nota:
  type: boolean
  default: false
  restriction_mode: A
strike_out:
  type: boolean
  default: false
  restriction_mode: A
onehundred_percent_base:
  type: string
  required: true
  enum:
    - no_general
    - valid
    - cast
    - entitled
    - entitled_present
    - disabled
  restriction_mode: A
