fields:
  id:
    type: number
    restriction_mode: A
    constant: true
    required: true
  weight:
    type: decimal(6)
    restriction_mode: A
    constant: true
    default: '1.000000'
  split:
    type: boolean
    default: false
    restriction_mode: A
  value:
    type: text
    restriction_mode: A
    constant: true
  poll_id:
    type: relation
    reference: poll
    to: poll/ballot_ids
    required: true
    restriction_mode: A
    constant: true
  poll_ballot_user_id:
    type: relation
    to: poll_ballot_user/poll_ballot_id
    reference: poll_ballot_user
    equal_fields: poll_id
    restriction_mode: A
